services:
  postgres:
    image: postgres:16-alpine
    container_name: blockchain-escrow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blockchain_escrow}
      POSTGRES_USER: ${POSTGRES_USER:-blockchain_escrow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blockchain_escrow}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blockchain_escrow} -d ${POSTGRES_DB:-blockchain_escrow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blockchain-escrow-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: blockchain-escrow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
