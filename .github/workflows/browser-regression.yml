name: browser-regression

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: browser-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Install Playwright Chromium
        run: pnpm e2e:install

      - name: Boot local infra
        run: pnpm boot:infra

      - name: Run browser regression
        run: pnpm e2e:regression

      - name: Upload browser regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-regression-artifacts
          path: |
            apps/e2e/playwright-report
            apps/e2e/test-results
          retention-days: 14

      - name: Stop local infra
        if: always()
        run: pnpm stop:infra
